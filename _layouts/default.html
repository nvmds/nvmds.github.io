<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% if page.title %}{{ page.title }} — Neverminds{% else %}{{ site.title }} — {{ site.description | strip_html | truncate: 80 }}{% endif %}</title>
{% seo %}
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}" />
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}" />
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}" />
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{{ '/assets/css/neverminds.css' | relative_url }}" />
{% if page.layout == 'post' %}<link rel="stylesheet" href="{{ '/assets/css/lightbox.css' | relative_url }}" />{% endif %}
</head>
<body>
{% include nav.html %}
{{ content }}
{% include footer.html %}
<script src="{{ '/assets/js/site.js' | relative_url }}"></script>
{% if page.layout == 'post' %}<script src="{{ '/assets/js/lightbox.js' | relative_url }}"></script>{% endif %}
{% if page.extra_js %}<script src="{{ page.extra_js | relative_url }}"></script>{% endif %}
</body>
</html>
