<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% if page.title %}{{ page.title }} — Neverminds{% else %}{{ site.title }} — {{ site.description | strip_html | truncate: 80 }}{% endif %}</title>
{% seo %}
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{{ '/assets/css/neverminds.css' | relative_url }}" />
</head>
<body>
{% include nav.html %}
{{ content }}
{% include footer.html %}
<script src="{{ '/assets/js/site.js' | relative_url }}"></script>
{% if page.extra_js %}<script src="{{ page.extra_js | relative_url }}"></script>{% endif %}
</body>
</html>
